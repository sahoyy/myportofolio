<!-- =========================
FONT
========================= -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- ICON -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.css">

<style>

/* =========================
RESET
========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
cursor:none;
}

:root{

--bg:#060606;
--card:#0f0f0f;
--soft:#121212;

--pink:#ff4fa3;
--pink2:#ff86c2;
--pink3:#ffb7dc;

--white:#ffffff;
--gray:#9f9f9f;

--border:rgba(255,255,255,0.08);

}

/* =========================
BODY
========================= */

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
color:white;
overflow-x:hidden;
position:relative;
}

/* =========================
ANIMATED BACKGROUND
========================= */

body::before{
content:'';
position:fixed;
inset:0;

background:
radial-gradient(circle at 10% 20%, rgba(255,79,163,0.18), transparent 20%),
radial-gradient(circle at 80% 0%, rgba(255,183,220,0.10), transparent 25%),
radial-gradient(circle at 90% 80%, rgba(255,79,163,0.12), transparent 25%);

animation:bgMove 18s infinite alternate ease-in-out;

z-index:-3;
}

@keyframes bgMove{

0%{
transform:translateY(0px) translateX(0px) scale(1);
}

100%{
transform:translateY(-40px) translateX(30px) scale(1.1);
}

}

/* floating blur */

.blur{
position:fixed;
width:500px;
height:500px;
border-radius:50%;
background:rgba(255,79,163,0.08);
filter:blur(120px);
z-index:-2;
animation:float 18s infinite alternate ease-in-out;
}

.blur:nth-child(1){
top:-100px;
left:-100px;
}

.blur:nth-child(2){
bottom:-100px;
right:-100px;
animation-delay:3s;
}

@keyframes float{

0%{
transform:translate(0,0);
}

100%{
transform:translate(80px,-50px);
}

}

/* =========================
CUSTOM CURSOR
========================= */

.cursor{
width:28px;
height:28px;
border:2px solid var(--pink);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
transition:0.08s;
z-index:999999;
backdrop-filter:blur(5px);
}

.cursor-dot{
width:6px;
height:6px;
background:var(--pink);
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:999999;
}

/* =========================
NAVBAR
========================= */

.navbar{

position:fixed;
top:0;
left:0;

width:100%;

padding:24px 7%;

display:flex;
justify-content:space-between;
align-items:center;

background:rgba(0,0,0,0.55);
backdrop-filter:blur(18px);

border-bottom:1px solid rgba(255,255,255,0.05);

z-index:1000;

}

.logo{
font-size:22px;
font-weight:700;
color:var(--pink);
letter-spacing:0.5px;
}

.nav-links{
display:flex;
list-style:none;
gap:40px;
}

.nav-links a{

text-decoration:none;
color:white;
font-size:14px;
font-weight:500;
position:relative;
transition:0.3s;

}

.nav-links a::after{

content:'';
position:absolute;
left:0;
bottom:-7px;

width:0%;
height:2px;

background:linear-gradient(to right,var(--pink),var(--pink3));

transition:0.35s;

}

.nav-links a:hover{
color:var(--pink2);
}

.nav-links a:hover::after{
width:100%;
}

/* =========================
HERO
========================= */

.hero{

min-height:100vh;

display:flex;
align-items:center;

padding:0 7%;

position:relative;

}

.hero-content{
max-width:900px;
}

.hero-badge{

display:inline-flex;
align-items:center;
gap:10px;

padding:12px 18px;

background:rgba(255,79,163,0.10);

border:1px solid rgba(255,79,163,0.20);

border-radius:50px;

color:var(--pink2);

font-size:14px;
font-weight:500;

margin-bottom:25px;

backdrop-filter:blur(10px);

}

.hero-badge i{
font-size:16px;
}

.hero-title{

font-size:clamp(52px,8vw,100px);
line-height:1.05;

font-weight:800;

margin-bottom:28px;

}

.hero-title span{

background:linear-gradient(to right,var(--pink),var(--pink3));

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.hero-subtitle{

font-size:18px;
line-height:1.9;

color:rgba(255,255,255,0.70);

max-width:760px;

margin-bottom:35px;

}

.hero-metrics{

display:flex;
gap:20px;
flex-wrap:wrap;

margin-bottom:45px;

}

.metric{

padding:14px 18px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

border-radius:16px;

font-size:14px;
color:rgba(255,255,255,0.7);

backdrop-filter:blur(10px);

}

.hero-buttons{
display:flex;
gap:18px;
flex-wrap:wrap;
}

.btn{

padding:16px 32px;

border-radius:16px;

text-decoration:none;

font-size:15px;
font-weight:600;

transition:0.35s;

display:inline-flex;
align-items:center;
gap:10px;

}

.btn-primary{

background:linear-gradient(135deg,var(--pink),#ff78bd);

color:black;

}

.btn-primary:hover{

transform:translateY(-5px);

box-shadow:0 15px 40px rgba(255,79,163,0.35);

}

.btn-secondary{

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.08);

color:white;

backdrop-filter:blur(10px);

}

.btn-secondary:hover{

border-color:rgba(255,79,163,0.3);

background:rgba(255,79,163,0.06);

}

/* =========================
SECTION
========================= */

.section{
padding:130px 7%;
}

.section-header{
margin-bottom:70px;
}

.section-title{

font-size:60px;
font-weight:800;

margin-bottom:16px;

}

.section-title span{
color:var(--pink);
}

.section-subtitle{

font-size:17px;

color:rgba(255,255,255,0.55);

max-width:700px;

line-height:1.8;

}

/* =========================
ABOUT
========================= */

.about-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:30px;

}

.about-card{

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

border-radius:28px;

padding:35px;

position:relative;

overflow:hidden;

backdrop-filter:blur(15px);

transition:0.35s;

}

.about-card:hover{

transform:translateY(-8px);

border-color:rgba(255,79,163,0.25);

}

.about-card::before{

content:'';

position:absolute;

width:250px;
height:250px;

background:rgba(255,79,163,0.08);

border-radius:50%;

top:-120px;
right:-120px;

filter:blur(40px);

}

.about-icon{

width:60px;
height:60px;

display:flex;
align-items:center;
justify-content:center;

border-radius:18px;

background:rgba(255,79,163,0.10);

border:1px solid rgba(255,79,163,0.20);

margin-bottom:25px;

}

.about-icon i{

font-size:28px;

color:var(--pink);

}

.about-card h3{

font-size:24px;

margin-bottom:18px;

}

.about-card p{

font-size:15px;

line-height:1.9;

color:rgba(255,255,255,0.65);

}

/* =========================
PROJECTS
========================= */

.projects-grid{

display:grid;
gap:35px;

}

.project-card{

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

border-radius:30px;

padding:35px;

backdrop-filter:blur(18px);

transition:0.35s;

position:relative;

overflow:hidden;

}

.project-card:hover{

transform:translateY(-10px);

border-color:rgba(255,79,163,0.25);

}

.project-card::before{

content:'';

position:absolute;

width:300px;
height:300px;

border-radius:50%;

background:rgba(255,79,163,0.06);

top:-140px;
right:-140px;

filter:blur(50px);

}

.project-image{

width:100%;
height:320px;

border-radius:22px;

border:1px dashed rgba(255,255,255,0.12);

background:
linear-gradient(
135deg,
rgba(255,79,163,0.06),
rgba(255,255,255,0.02)
);

display:flex;
align-items:center;
justify-content:center;

font-size:14px;

color:rgba(255,255,255,0.3);

margin-bottom:30px;

overflow:hidden;

}

.project-header{

display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;

margin-bottom:20px;

}

.project-title{

font-size:28px;
font-weight:700;

}

.project-links{
display:flex;
gap:12px;
}

.project-link{

width:45px;
height:45px;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.08);

color:white;

text-decoration:none;

transition:0.3s;

}

.project-link:hover{

background:rgba(255,79,163,0.10);

border-color:rgba(255,79,163,0.30);

color:var(--pink);

transform:translateY(-3px);

}

.project-description{

font-size:15px;

line-height:1.9;

color:rgba(255,255,255,0.68);

margin-bottom:25px;

}

.project-highlights{

display:flex;
flex-direction:column;
gap:14px;

margin-bottom:28px;

}

.highlight{

display:flex;
align-items:flex-start;
gap:14px;

font-size:14px;

line-height:1.8;

color:rgba(255,255,255,0.62);

}

.highlight i{
color:var(--pink);
margin-top:4px;
}

.tags{

display:flex;
flex-wrap:wrap;
gap:12px;

}

.tag{

padding:10px 16px;

border-radius:40px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

font-size:13px;

color:rgba(255,255,255,0.75);

}

/* =========================
CERTIFICATION
========================= */

.cert-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

gap:25px;

}

.cert-card{

padding:30px;

border-radius:25px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

backdrop-filter:blur(15px);

transition:0.35s;

}

.cert-card:hover{

transform:translateY(-8px);

border-color:rgba(255,79,163,0.25);

}

.cert-card h3{
font-size:22px;
margin-bottom:12px;
}

.cert-card p{

line-height:1.8;

color:rgba(255,255,255,0.6);

font-size:15px;

}

/* =========================
CONTACT
========================= */

.contact-box{

padding:90px;

border-radius:40px;

background:
linear-gradient(
135deg,
rgba(255,79,163,0.10),
rgba(255,255,255,0.02)
);

border:1px solid rgba(255,255,255,0.06);

text-align:center;

backdrop-filter:blur(20px);

position:relative;

overflow:hidden;

}

.contact-box::before{

content:'';

position:absolute;

width:500px;
height:500px;

border-radius:50%;

background:rgba(255,79,163,0.08);

top:-250px;
right:-250px;

filter:blur(60px);

}

.contact-title{

font-size:58px;

font-weight:800;

margin-bottom:20px;

}

.contact-subtitle{

font-size:17px;

line-height:1.9;

color:rgba(255,255,255,0.65);

max-width:750px;

margin:auto;

margin-bottom:40px;

}

.contact-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:40px;

}

.contact-item{

padding:28px;

border-radius:22px;

background:rgba(255,255,255,0.03);

border:1px solid rgba(255,255,255,0.06);

transition:0.35s;

}

.contact-item:hover{

transform:translateY(-5px);

border-color:rgba(255,79,163,0.25);

}

.contact-label{

font-size:13px;

text-transform:uppercase;

letter-spacing:1px;

color:rgba(255,255,255,0.4);

margin-bottom:10px;

}

.contact-value{

font-size:15px;

font-weight:600;

color:var(--pink2);

word-break:break-word;

}

/* =========================
FOOTER
========================= */

footer{

padding:45px 20px;

text-align:center;

color:rgba(255,255,255,0.4);

font-size:14px;

border-top:1px solid rgba(255,255,255,0.04);

}

/* =========================
SCROLL ANIMATION
========================= */

.fade{

opacity:0;
transform:translateY(50px);

transition:1s;

}

.fade.show{

opacity:1;
transform:translateY(0);

}

/* =========================
RESPONSIVE
========================= */

@media(max-width:900px){

.nav-links{
display:none;
}

.hero-title{
font-size:60px;
}

.section-title{
font-size:44px;
}

.contact-title{
font-size:42px;
}

.contact-box{
padding:50px 30px;
}

.project-image{
height:240px;
}

}

</style>

<!-- =========================
CUSTOM CURSOR
========================= -->

<div class="cursor"></div>
<div class="cursor-dot"></div>

<div class="blur"></div>
<div class="blur"></div>

<script>

/* =========================
CUSTOM CURSOR
========================= */

const cursor = document.querySelector('.cursor');
const dot = document.querySelector('.cursor-dot');

document.addEventListener('mousemove', (e)=>{

cursor.style.left = e.clientX + 'px';
cursor.style.top = e.clientY + 'px';

dot.style.left = e.clientX + 'px';
dot.style.top = e.clientY + 'px';

});

/* =========================
SCROLL REVEAL
========================= */

const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', ()=>{

fades.forEach(el=>{

const top = el.getBoundingClientRect().top;

if(top < window.innerHeight - 100){
el.classList.add('show');
}

});

});

</script>
